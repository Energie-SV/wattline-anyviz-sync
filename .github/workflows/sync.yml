name: Wattline → AnyViz Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Sync ausführen
        env:
          WATTLINE_BASE_URL:      ${{ secrets.WATTLINE_BASE_URL }}
          WATTLINE_CLIENT_SECRET: ${{ secrets.WATTLINE_CLIENT_SECRET }}
          WATTLINE_USERNAME:      ${{ secrets.WATTLINE_USERNAME }}
          WATTLINE_PASSWORD:      ${{ secrets.WATTLINE_PASSWORD }}
        run: python sync.py

      - name: data.json committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push
