name: Wattline → AnyViz Sync

on:
  schedule:
    # Alle 15 Minuten (GitHub Actions Minimum: 5 Minuten)
    - cron: "*/15 * * * *"
  workflow_dispatch:  # Erlaubt manuellen Start über GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Sync-State aus Cache laden
        uses: actions/cache@v4
        with:
          path: sync_state.json
          key: sync-state-${{ github.run_id }}
          restore-keys: |
            sync-state-

      - name: Sync ausführen
        env:
          WATTLINE_BASE_URL:      ${{ secrets.WATTLINE_BASE_URL }}
          WATTLINE_CLIENT_SECRET: ${{ secrets.WATTLINE_CLIENT_SECRET }}
          WATTLINE_USERNAME:      ${{ secrets.WATTLINE_USERNAME }}
          WATTLINE_PASSWORD:      ${{ secrets.WATTLINE_PASSWORD }}
          ANYVIZ_BASE_URL:        ${{ secrets.ANYVIZ_BASE_URL }}
          ANYVIZ_API_KEY:         ${{ secrets.ANYVIZ_API_KEY }}
        run: python sync.py
